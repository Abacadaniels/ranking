<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ranking de Heróis</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#0f0f0f;
    color:white;
}

h1{
    text-align:center;
    margin:20px;
}

/* GRID */
.ranking{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:40px;
}

/* SEÇÕES */
.section{
    width:90%;
}

.grid{
    display:grid;
    gap:15px;
}

/* TAMANHOS */
.top10 .grid{
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
}

.top20 .grid{
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
}

.top35 .grid{
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
}

/* CARD */
.card{
    background:#1a1a1a;
    border-radius:15px;
    padding:10px;
    text-align:center;
    transition:0.2s;
}

.card:hover{
    transform:scale(1.05);
}

.card img{
    width:100%;
    border-radius:10px;
    background:#333;
}

/* DIFERENÇA VISUAL */
.top10 .card{
    font-size:16px;
    padding:15px;
}

.top20 .card{
    font-size:14px;
}

.top35 .card{
    font-size:12px;
    opacity:0.85;
}

/* NOME */
.name{
    font-weight:bold;
    margin-top:5px;
}

/* RANK */
.rank{
    color:#aaa;
    font-size:12px;
}
</style>
</head>

<body>

<h1>RANKING OFICIAL</h1>

<div class="ranking">

<!-- TOP 10 -->
<div class="section top10">
    <h2>TOP 10</h2>
    <div class="grid" id="top10"></div>
</div>

<!-- TOP 11-20 -->

    <h2>11 - 20</h2>
    <div class="grid" id="top20"></div>

<!-- TOP 21-35 -->

function criarCard(hero){
    return `
    <div class="card">
        <img src="img/hero${hero.pos}.png"
             onerror="this.src='https://via.placeholder.com/300x300?text=Hero'">
        <div class="rank">#${hero.pos} (${hero.rank})</div>

    </div>
    `;
}

const top20 = heroes.slice(10,20);
const top35 = heroes.slice(20,35);

document.getElementById("top10").innerHTML = top10.map(criarCard).join("");
